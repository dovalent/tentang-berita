<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS — TENTANG Berita</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brand:#1d4ed8;--brand-dark:#1e3a8a;--accent:#dc2626;--bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:.875rem}

/* Layout */
.topbar{position:sticky;top:0;z-index:50;background:var(--brand-dark);color:#fff;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar h1{font-size:1rem;font-weight:800;letter-spacing:-.02em}
.topbar h1 span{color:#93c5fd;font-weight:500;font-size:.75rem;margin-left:.5rem;text-transform:uppercase;letter-spacing:.08em}
.topbar-actions{display:flex;gap:.5rem}
.container{max-width:1100px;margin:0 auto;padding:1.5rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:8px;font-size:.8125rem;font-weight:600;border:none;transition:all .2s}
.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand-dark)}
.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}
.btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-outline{background:transparent;color:var(--text-muted);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--brand);color:var(--brand)}
.btn-sm{padding:.4rem .75rem;font-size:.75rem}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

/* Article List */
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.list-header h2{font-size:1.25rem;font-weight:700}
.search-box{padding:.5rem .85rem;border:1px solid var(--border);border-radius:8px;width:260px;font-size:.8125rem;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--brand)}
.article-row{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;border-bottom:1px solid var(--border);transition:background .15s}
.article-row:last-child{border-bottom:none}
.article-row:hover{background:#f8fafc}
.article-thumb{width:72px;height:48px;border-radius:6px;object-fit:cover;background:#e2e8f0;flex-shrink:0}
.article-info{flex:1;min-width:0}
.article-info h3{font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-meta{font-size:.75rem;color:var(--text-muted);margin-top:2px;display:flex;gap:.75rem;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.badge-news{background:#dbeafe;color:#1d4ed8}
.badge-nasional{background:#dbeafe;color:#1d4ed8}
.badge-film{background:#f3e8ff;color:#7c3aed}
.badge-game{background:#e0e7ff;color:#4338ca}
.badge-lifehacks{background:#d1fae5;color:#059669}
.badge-banyuwangi{background:#ccfbf1;color:#0d9488}
.badge-opini{background:#fef3c7;color:#d97706}
.article-actions{display:flex;gap:.4rem;flex-shrink:0}
.empty-state{text-align:center;padding:3rem;color:var(--text-muted)}
.empty-state svg{width:48px;height:48px;margin:0 auto 1rem;opacity:.4}

/* Editor */
.editor-page{display:none}
.editor-page.active{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding:1.5rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-group.full{grid-column:1/-1}
.form-label{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{padding:.55rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.875rem;outline:none;transition:border .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand)}
.form-textarea{min-height:320px;resize:vertical;font-family:'Consolas','Monaco',monospace;line-height:1.6;font-size:.8125rem}
.editor-toolbar{display:flex;gap:.25rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:#f8fafc;flex-wrap:wrap}
.tb-btn{padding:.35rem .55rem;border:1px solid var(--border);border-radius:5px;background:#fff;font-size:.75rem;color:var(--text-muted);transition:all .15s}
.tb-btn:hover{border-color:var(--brand);color:var(--brand);background:#eff6ff}
.editor-footer{display:flex;justify-content:space-between;padding:1rem 1.5rem;border-top:1px solid var(--border);background:#f8fafc}

/* Image upload */
.img-upload-zone{border:2px dashed var(--border);border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.img-upload-zone:hover{border-color:var(--brand);background:#eff6ff}
.img-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-zone.has-image{border-style:solid;padding:.5rem}
.img-preview{max-height:140px;border-radius:6px;margin-top:.5rem}
.img-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.5rem;margin-top:.75rem;max-height:200px;overflow-y:auto}
.img-gallery img{width:100%;height:60px;object-fit:cover;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:border .15s}
.img-gallery img:hover,.img-gallery img.selected{border-color:var(--brand)}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.25rem;border-radius:8px;color:#fff;font-size:.8125rem;font-weight:600;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:#059669}
.toast-error{background:#dc2626}

/* Responsive */
@media(max-width:768px){
  .form-grid{grid-template-columns:1fr}
  .article-row{flex-wrap:wrap}
  .article-actions{width:100%;justify-content:flex-end}
  .search-box{width:100%}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>📰 TENTANG Berita <span>CMS</span></h1>
  <div class="topbar-actions">
    <a href="http://localhost:4321" target="_blank" class="btn btn-ghost btn-sm">🔗 Lihat Website</a>
    <button class="btn btn-ghost btn-sm" onclick="showList()">📋 Daftar Artikel</button>
    <button class="btn btn-primary btn-sm" onclick="showEditor()">＋ Tulis Artikel</button>
  </div>
</div>

<!-- LIST PAGE -->
<div id="listPage" class="container">
  <div class="list-header">
    <h2>Semua Artikel <span id="articleCount" style="font-weight:400;font-size:.875rem;color:var(--text-muted)"></span></h2>
    <input type="text" class="search-box" placeholder="🔍 Cari artikel..." oninput="filterArticles(this.value)" id="searchInput">
  </div>
  <div class="card" id="articleList">
    <div class="empty-state">Memuat artikel...</div>
  </div>
</div>

<!-- EDITOR PAGE -->
<div id="editorPage" class="editor-page">
  <div class="container">
    <div class="card">
      <div class="editor-toolbar">
        <button class="tb-btn" onclick="insertMd('## ','')">H2</button>
        <button class="tb-btn" onclick="insertMd('### ','')">H3</button>
        <button class="tb-btn" onclick="insertMd('**','**')">B</button>
        <button class="tb-btn" onclick="insertMd('*','*')"><i>I</i></button>
        <button class="tb-btn" onclick="insertMd('[','](url)')">🔗</button>
        <button class="tb-btn" onclick="insertMd('\n- ','')">• List</button>
        <button class="tb-btn" onclick="insertMd('\n1. ','')">1. List</button>
        <button class="tb-btn" onclick="insertMd('\n> ','')">❝ Quote</button>
        <button class="tb-btn" onclick="insertMd('`','`')">Code</button>
        <button class="tb-btn" onclick="insertMd('\n```\n','\n```\n')">``` Block</button>
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Judul Artikel *</label>
          <input type="text" class="form-input" id="fTitle" placeholder="Tulis judul artikel..." oninput="autoSlug()">
        </div>
        <div class="form-group">
          <label class="form-label">Permalink (URL)</label>
          <input type="text" class="form-input" id="fPermalink" placeholder="otomatis-dari-judul" style="color:var(--text-muted)">
        </div>
        <div class="form-group">
          <label class="form-label">Tanggal</label>
          <input type="date" class="form-input" id="fDate">
        </div>
        <div class="form-group">
          <label class="form-label">Penulis *</label>
          <input type="text" class="form-input" id="fAuthor" placeholder="Nama penulis">
        </div>
        <div class="form-group">
          <label class="form-label">Kategori *</label>
          <select class="form-select" id="fCategory">
            <option value="News">News</option>
            <option value="Film & Movie">Film & Movie</option>
            <option value="Game">Game</option>
            <option value="Lifehacks">Lifehacks & Solusi Teknis</option>
            <option value="Banyuwangi">Banyuwangi</option>
            <option value="Opini">Opini</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="form-label">Tags (pisahkan dengan koma)</label>
          <input type="text" class="form-input" id="fTags" placeholder="ekonomi, kebijakan, fiskal">
        </div>
        <div class="form-group full">
          <label class="form-label">Ringkasan / Excerpt *</label>
          <input type="text" class="form-input" id="fExcerpt" placeholder="Ringkasan 1-2 kalimat untuk preview card dan SEO">
        </div>

        <!-- Image Section -->
        <div class="form-group">
          <label class="form-label">Gambar Hero</label>
          <div class="img-upload-zone" id="uploadZone">
            <input type="file" accept="image/*" onchange="uploadImage(event)">
            <div id="uploadLabel">📷 Klik untuk upload gambar<br><small style="color:var(--text-muted)">PNG, JPG, WebP — idealnya 1200px lebar</small></div>
          </div>
          <input type="hidden" id="fImageUrl">
        </div>
        <div class="form-group">
          <label class="form-label">Atau Pilih dari Galeri</label>
          <div class="img-gallery" id="imgGallery"></div>
          <div class="form-group" style="margin-top:.5rem">
            <label class="form-label">Keterangan Gambar</label>
            <input type="text" class="form-input" id="fImageCaption" placeholder="Opsional">
          </div>
        </div>

        <!-- Body -->
        <div class="form-group full">
          <label class="form-label">Isi Artikel (Markdown) *</label>
          <textarea class="form-textarea" id="fBody" placeholder="Tulis isi artikel di sini menggunakan format Markdown..."></textarea>
        </div>
      </div>

      <div class="editor-footer">
        <button class="btn btn-outline" onclick="showList()">← Batal</button>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-primary" onclick="saveArticle()" id="btnSave">💾 Simpan Artikel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let editingPermalink = null;

// ── Navigation ──
function showList() {
  document.getElementById('listPage').style.display = 'block';
  document.getElementById('editorPage').classList.remove('active');
  editingPermalink = null;
  loadArticles();
}

function showEditor(article = null) {
  document.getElementById('listPage').style.display = 'none';
  document.getElementById('editorPage').classList.add('active');
  loadGallery();

  if (article) {
    editingPermalink = article.permalink;
    document.getElementById('fTitle').value = article.title || '';
    document.getElementById('fPermalink').value = article.permalink || '';
    document.getElementById('fDate').value = article.date || '';
    document.getElementById('fAuthor').value = article.author || '';
    document.getElementById('fCategory').value = article.category || 'News';
    document.getElementById('fTags').value = Array.isArray(article.tags) ? article.tags.join(', ') : (article.tags || '');
    document.getElementById('fExcerpt').value = article.excerpt || '';
    document.getElementById('fImageUrl').value = article.image_url || '';
    document.getElementById('fImageCaption').value = article.image_caption || '';
    document.getElementById('fBody').value = article.body || '';
    document.getElementById('btnSave').textContent = '💾 Update Artikel';
    if (article.image_url) updateImagePreview(article.image_url);
  } else {
    editingPermalink = null;
    ['fTitle','fPermalink','fAuthor','fTags','fExcerpt','fImageUrl','fImageCaption','fBody'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('fCategory').value = 'News';
    document.getElementById('btnSave').textContent = '💾 Simpan Artikel';
    document.getElementById('uploadLabel').innerHTML = '📷 Klik untuk upload gambar<br><small style="color:var(--text-muted)">PNG, JPG, WebP</small>';
    document.getElementById('uploadZone').classList.remove('has-image');
  }
  window.scrollTo(0, 0);
}

// ── Load Articles ──
async function loadArticles() {
  try {
    const res = await fetch(API + '/api/articles');
    const articles = await res.json();
    renderArticles(articles);
  } catch (e) {
    document.getElementById('articleList').innerHTML = '<div class="empty-state">⚠️ Gagal memuat artikel. Pastikan CMS server berjalan.</div>';
  }
}

function renderArticles(articles) {
  const el = document.getElementById('articleList');
  document.getElementById('articleCount').textContent = `(${articles.length} artikel)`;

  if (!articles.length) {
    el.innerHTML = '<div class="empty-state"><p style="font-size:1.5rem;margin-bottom:.5rem">📝</p><p>Belum ada artikel.</p><p style="margin-top:.5rem"><button class="btn btn-primary btn-sm" onclick="showEditor()">Tulis Artikel Pertama</button></p></div>';
    return;
  }

  el.innerHTML = articles.map(a => {
    const cat = (a.category || '').toLowerCase();
    const badgeClass = {news:'badge-news',nasional:'badge-nasional',film:'badge-film','film & movie':'badge-film',game:'badge-game',lifehacks:'badge-lifehacks',banyuwangi:'badge-banyuwangi',opini:'badge-opini'}[cat] || '';
    const dateStr = new Date(a.date).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'});
    return `<div class="article-row">
      <img src="${a.image_url || ''}" class="article-thumb" onerror="this.style.display='none'">
      <div class="article-info">
        <h3>${esc(a.title)}</h3>
        <div class="article-meta">
          <span class="badge ${badgeClass}">${esc(a.category)}</span>
          <span>${esc(a.author)}</span>
          <span>${dateStr}</span>
        </div>
      </div>
      <div class="article-actions">
        <button class="btn btn-outline btn-sm" onclick='editArticle("${esc(a.permalink)}")'>✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick='deleteArticle("${esc(a.permalink)}","${esc(a.title)}")'>🗑</button>
      </div>
    </div>`;
  }).join('');
}

function filterArticles(query) {
  const rows = document.querySelectorAll('.article-row');
  const q = query.toLowerCase();
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? 'flex' : 'none';
  });
}

// ── CRUD ──
async function editArticle(permalink) {
  const res = await fetch(API + '/api/articles/' + encodeURIComponent(permalink));
  const article = await res.json();
  showEditor(article);
}

async function saveArticle() {
  const data = {
    title: document.getElementById('fTitle').value.trim(),
    permalink: document.getElementById('fPermalink').value.trim(),
    date: document.getElementById('fDate').value,
    author: document.getElementById('fAuthor').value.trim(),
    category: document.getElementById('fCategory').value,
    tags: document.getElementById('fTags').value,
    excerpt: document.getElementById('fExcerpt').value.trim(),
    image_url: document.getElementById('fImageUrl').value.trim(),
    image_caption: document.getElementById('fImageCaption').value.trim(),
    body: document.getElementById('fBody').value,
  };

  if (!data.title || !data.author || !data.excerpt || !data.body) {
    return toast('Lengkapi field yang wajib (judul, penulis, ringkasan, isi)', 'error');
  }

  try {
    const isEdit = !!editingPermalink;
    const url = isEdit ? API + '/api/articles/' + encodeURIComponent(editingPermalink) : API + '/api/articles';
    const method = isEdit ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const result = await res.json();

    if (result.error) return toast(result.error, 'error');

    toast(isEdit ? 'Artikel berhasil diupdate! ✅' : 'Artikel berhasil disimpan! ✅', 'success');
    setTimeout(() => showList(), 800);
  } catch (e) {
    toast('Gagal menyimpan: ' + e.message, 'error');
  }
}

async function deleteArticle(permalink, title) {
  if (!confirm(`Hapus artikel "${title}"?\n\nAksi ini tidak bisa dibatalkan.`)) return;

  try {
    await fetch(API + '/api/articles/' + encodeURIComponent(permalink), { method: 'DELETE' });
    toast('Artikel dihapus ✅', 'success');
    loadArticles();
  } catch (e) {
    toast('Gagal menghapus', 'error');
  }
}

// ── Image Upload ──
async function uploadImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('image', file);

  try {
    toast('Mengupload gambar...', 'success');
    const res = await fetch(API + '/api/upload', { method: 'POST', body: formData });
    const result = await res.json();

    if (result.error) return toast(result.error, 'error');

    document.getElementById('fImageUrl').value = result.url;
    updateImagePreview(result.url);
    loadGallery();
    toast('Gambar berhasil diupload! ✅', 'success');
  } catch (e) {
    toast('Gagal upload gambar', 'error');
  }
}

function updateImagePreview(url) {
  const zone = document.getElementById('uploadZone');
  zone.classList.add('has-image');
  document.getElementById('uploadLabel').innerHTML = `<img src="${url}" class="img-preview"><br><small style="color:var(--text-muted)">Klik untuk ganti gambar</small>`;
}

async function loadGallery() {
  try {
    const res = await fetch(API + '/api/images');
    const images = await res.json();
    const gallery = document.getElementById('imgGallery');
    gallery.innerHTML = images.map(img =>
      `<img src="/images/${img}" alt="${img}" onclick="selectGalleryImage('/images/${img}')" title="${img}">`
    ).join('');
  } catch {}
}

function selectGalleryImage(url) {
  document.getElementById('fImageUrl').value = url;
  updateImagePreview(url);
  // Highlight selected
  document.querySelectorAll('.img-gallery img').forEach(img => {
    img.classList.toggle('selected', img.src.includes(url.split('/').pop()));
  });
}

// ── Markdown Toolbar ──
function insertMd(before, after) {
  const ta = document.getElementById('fBody');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  ta.value = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + before.length;
  ta.selectionEnd = start + before.length + selected.length;
}

// ── Helpers ──
function autoSlug() {
  const title = document.getElementById('fTitle').value;
  if (!editingPermalink) {
    document.getElementById('fPermalink').value = title
      .toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
  }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──
loadArticles();
</script>
</body>
</html>
